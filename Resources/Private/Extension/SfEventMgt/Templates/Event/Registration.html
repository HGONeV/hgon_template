<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:e="http://typo3.org/ns/DERHANSEN/SfEventMgt/ViewHelpers"
      data-namespace-typo3-fluid="true">

<f:layout name="Default" />
<f:section name="main">
    <f:if condition="{event.registrationPossible}">
        <f:then>
            <e:title pageTitle="{event.title}" />

            <section class="article article--fullwidth">
                <div class="wrap wrap--text">
                    <f:if condition="{settings.detailPid}">
                        <div class="event-registration-links event-registration-links--top">
                            <f:link.action action="detail" pageUid="{settings.detailPid}" arguments="{event: event}" class="btn btn--rounded btn--tertiary"><f:translate key="event.backDetailsText" /></f:link.action>
                        </div>
                    </f:if>

                    <div class="event-registration-summary">
                        <h1>{event.title}</h1>

                        <div class="event-registration-summary__rows">
                            <div class="event-registration-summary__row">
                                <span class="event-registration-summary__label"><f:translate key="tx_sfeventmgt_domain_model_event.startdate" /></span>
                                <span class="event-registration-summary__value"><f:format.date format="%d.%m.%Y - %H:%M">{event.startdate}</f:format.date></span>
                            </div>
                            <div class="event-registration-summary__row">
                                <span class="event-registration-summary__label"><f:translate key="tx_sfeventmgt_domain_model_event.enddate" /></span>
                                <span class="event-registration-summary__value"><f:format.date format="%d.%m.%Y - %H:%M">{event.enddate}</f:format.date></span>
                            </div>
                            <f:if condition="{event.currentPrice} > 0">
                                <div class="event-registration-summary__row">
                                    <span class="event-registration-summary__label"><f:translate key="tx_sfeventmgt_domain_model_event.price" /></span>
                                    <span class="event-registration-summary__value">
                                        {event.currentPrice} {event.currency} <f:if condition="{event.taxRate} > 0">(<f:translate key="registration.price.vatLabel" extensionName="HgonTemplate" arguments="{0: event.taxRate}" />)</f:if>
                                    </span>
                                </div>
                            </f:if>
                            <f:if condition="{event.location}">
                                <div class="event-registration-summary__row">
                                    <span class="event-registration-summary__label"><f:translate key="tx_sfeventmgt_domain_model_event.location" /></span>
                                    <span class="event-registration-summary__value">{event.location.title}</span>
                                </div>
                            </f:if>
                        </div>
                    </div>

                    <f:if condition="{event.enableWaitlist}">
                        <f:if condition="{event.maxParticipants} != 0 && {event.registrations->f:count()} >= {event.maxParticipants}">
                            <p class="event-registration-note">
                                <strong><f:translate key="registration.form.waitlist" /></strong>
                            </p>
                        </f:if>
                    </f:if>

                    <f:form object="{registration}" name="registration" action="saveRegistration" arguments="{event: event}" section="event-registration-errors" id="event-registration-form" class="form form--event-registration registration" enctype="multipart/form-data">
                        <h3><f:translate key="registration.form.heading" extensionName="HgonTemplate" /></h3>
                        <f:form.validationResults>
                            <f:if condition="{validationResults.flattenedErrors}">
                                <div class="msg-small msg-small--alert mb-1" role="alert" id="event-registration-errors">
                                    <strong class="msg-small__headline"><f:translate key="registration.form.validationError.title" extensionName="HgonTemplate" /></strong>
                                    <p><f:translate key="registration.form.validationError.message" extensionName="HgonTemplate" /></p>
                                </div>
                            </f:if>
                        </f:form.validationResults>
                        <fieldset>
                                <f:render partial="Registration/SpamCheck" arguments="{spamSettings: settings.registration.spamCheck, event: event}" />

                                <div class="form__field event-registration-row {e:validation.errorClass(fieldname: 'gender')}">
                                    <label class="label" for="gender">
                                        <f:translate key="tx_sfeventmgt_domain_model_registration.gender" />
                                        <e:registration.isRequiredField settings="{settings}" fieldname="gender">
                                            <span class="event-required">*</span>
                                        </e:registration.isRequiredField>
                                    </label>
                                    <span class="select-box">
                                        <f:form.select id="gender" property="gender">
                                            <option value=""><f:translate key="tx_sfeventmgt_domain_model_registration.gender.notset" /></option>
                                            <option value="f"><f:translate key="tx_sfeventmgt_domain_model_registration.gender.female" /></option>
                                            <option value="m"><f:translate key="tx_sfeventmgt_domain_model_registration.gender.male" /></option>
                                            <option value="v"><f:translate key="tx_sfeventmgt_domain_model_registration.gender.various" /></option>
                                        </f:form.select>
                                    </span>

                                    <f:render partial="FormErrors" arguments="{field: 'registration.gender'}" />
                                </div>

                                <div class="form__field event-registration-row {e:validation.errorClass(fieldname: 'title')}">
                                    <label class="label" for="title">
                                        <f:translate key="tx_sfeventmgt_domain_model_registration.title" />
                                        <e:registration.isRequiredField settings="{settings}" fieldname="title">
                                            <span class="event-required">*</span>
                                        </e:registration.isRequiredField>
                                    </label>
                                    <f:form.textfield id="title" class="input" property="title" value="{e:prefill(fieldname: 'title', prefillSettings: '{settings.registration.prefillFields}')}" />
                                    <f:render partial="FormErrors" arguments="{field: 'registration.title'}" />
                                </div>

                                <div class="form__field event-registration-row {e:validation.errorClass(fieldname: 'firstname')}">
                                    <label class="label" for="firstname">
                                        <f:translate key="tx_sfeventmgt_domain_model_registration.firstname" />
                                        <e:registration.isRequiredField settings="{settings}" fieldname="firstname">
                                            <span class="event-required">*</span>
                                        </e:registration.isRequiredField>
                                    </label>
                                    <f:form.textfield id="firstname" class="input" property="firstname" value="{e:prefill(fieldname: 'firstname', prefillSettings: '{settings.registration.prefillFields}')}" />
                                    <f:render partial="FormErrors" arguments="{field: 'registration.firstname'}" />
                                </div>

                                <div class="form__field event-registration-row {e:validation.errorClass(fieldname: 'lastname')}">
                                    <label class="label" for="lastname">
                                        <f:translate key="tx_sfeventmgt_domain_model_registration.lastname" />
                                        <e:registration.isRequiredField settings="{settings}" fieldname="lastname">
                                            <span class="event-required">*</span>
                                        </e:registration.isRequiredField>
                                    </label>
                                    <f:form.textfield id="lastname" class="input" property="lastname" value="{e:prefill(fieldname: 'lastname', prefillSettings: '{settings.registration.prefillFields}')}" />
                                    <f:render partial="FormErrors" arguments="{field: 'registration.lastname'}" />
                                </div>

                                <div class="form__field event-registration-row {e:validation.errorClass(fieldname: 'address')}">
                                    <label class="label" for="address">
                                        <f:translate key="tx_sfeventmgt_domain_model_registration.address" />
                                        <e:registration.isRequiredField settings="{settings}" fieldname="address">
                                            <span class="event-required">*</span>
                                        </e:registration.isRequiredField>
                                    </label>
                                    <f:form.textfield id="address" class="input" property="address" value="{e:prefill(fieldname: 'address', prefillSettings: '{settings.registration.prefillFields}')}" />
                                    <f:render partial="FormErrors" arguments="{field: 'registration.address'}" />
                                </div>

                                <div class="form__field event-registration-row {e:validation.errorClass(fieldname: 'zip')}">
                                    <label class="label" for="zip">
                                        <f:translate key="registration.form.zip" extensionName="HgonTemplate" />
                                        <e:registration.isRequiredField settings="{settings}" fieldname="zip">
                                            <span class="event-required">*</span>
                                        </e:registration.isRequiredField>
                                    </label>
                                    <f:form.textfield id="zip" class="input" property="zip" value="{e:prefill(fieldname: 'zip', prefillSettings: '{settings.registration.prefillFields}')}" />
                                    <f:render partial="FormErrors" arguments="{field: 'registration.zip'}" />
                                </div>

                                <div class="form__field event-registration-row {e:validation.errorClass(fieldname: 'city')}">
                                    <label class="label" for="city">
                                        <f:translate key="tx_sfeventmgt_domain_model_registration.city" />
                                        <e:registration.isRequiredField settings="{settings}" fieldname="city">
                                            <span class="event-required">*</span>
                                        </e:registration.isRequiredField>
                                    </label>
                                    <f:form.textfield id="city" class="input" property="city" value="{e:prefill(fieldname: 'city', prefillSettings: '{settings.registration.prefillFields}')}" />
                                    <f:render partial="FormErrors" arguments="{field: 'registration.city'}" />
                                </div>

                                <div class="form__field event-registration-row {e:validation.errorClass(fieldname: 'email')}">
                                    <label class="label" for="email">
                                        <f:translate key="tx_sfeventmgt_domain_model_registration.email" />
                                        <e:registration.isRequiredField settings="{settings}" fieldname="email">
                                            <span class="event-required">*</span>
                                        </e:registration.isRequiredField>
                                    </label>
                                    <f:form.textfield id="email" class="input" property="email" value="{e:prefill(fieldname: 'email', prefillSettings: '{settings.registration.prefillFields}')}" />
                                    <f:render partial="FormErrors" arguments="{field: 'registration.email'}" />
                                </div>

                                <div class="form__field event-registration-row {e:validation.errorClass(fieldname: 'phone')}">
                                    <label class="label" for="phone">
                                        <f:translate key="tx_sfeventmgt_domain_model_registration.phone" />
                                        <e:registration.isRequiredField settings="{settings}" fieldname="phone">
                                            <span class="event-required">*</span>
                                        </e:registration.isRequiredField>
                                    </label>
                                    <f:form.textfield id="phone" class="input" property="phone" value="{e:prefill(fieldname: 'phone', prefillSettings: '{settings.registration.prefillFields}')}" />
                                    <f:render partial="FormErrors" arguments="{field: 'registration.phone'}" />
                                </div>

                                <f:if condition="{event.maxRegistrationsPerUser} > 1">
                                    <div class="form__field event-registration-row">
                                        <label class="label" for="amountOfRegistrations"><f:translate key="tx_sfeventmgt_domain_model_registration.amountOfRegistrations" /></label>
                                        <span class="select-box">
                                            <f:form.select id="amountOfRegistrations" property="amountOfRegistrations" options="{e:event.simultaneousRegistrations(event: '{event}')}" />
                                        </span>
                                    </div>
                                </f:if>

                                <f:render partial="Registration/CulinaryAddons" arguments="{event: event, eventCulinarySelections: eventCulinarySelections, eventCulinaryMaxQuantity: eventCulinaryMaxQuantity}" />

                                <f:if condition="{event.activePriceOptions}">
                                    <div class="form__field event-registration-row event-registration-row--choice {e:validation.errorClass(fieldname: 'priceOption')}">
                                        <label class="label" for="price-option-{event.activePriceOptions.0.uid}">
                                            <f:translate key="tx_sfeventmgt_domain_model_registration.priceOption" />
                                            <e:registration.isRequiredField settings="{settings}" fieldname="priceOption">
                                                <span class="event-required">*</span>
                                            </e:registration.isRequiredField>
                                        </label>

                                        <div class="inputs-list radio-group">
                                            <f:for each="{event.activePriceOptions}" as="priceOption">
                                                <label class="radio" for="price-option-{priceOption.uid}">
                                                    <span class="radio__input">
                                                        <f:form.radio id="price-option-{priceOption.uid}" class="input input-radio" name="priceOption" property="priceOption" value="{priceOption.uid}" />
                                                        <label for="price-option-{priceOption.uid}"></label>
                                                    </span>
                                                    <span class="checkbox__label">
                                                        {priceOption.title} - {priceOption.price -> f:format.number(decimals: 2)} {event.currency}
                                                        <f:if condition="{priceOption.taxRate} > 0">(<f:translate key="registration.price.vatLabel" extensionName="HgonTemplate" arguments="{0: priceOption.taxRate}" />)</f:if>
                                                    </span>
                                                </label>
                                            </f:for>
                                        </div>

                                        <f:render partial="FormErrors" arguments="{field: 'registration.priceOption'}" />
                                    </div>
                                </f:if>

                                <f:if condition="{event.enablePayment}">
                                    <div class="form__field event-registration-row">
                                        <label class="label" for="paymentmethod"><f:translate key="tx_sfeventmgt_domain_model_registration.paymentmethod" /></label>
                                        <span class="select-box">
                                            <f:form.select id="paymentmethod" property="paymentmethod" options="{paymentMethods}" />
                                        </span>
                                    </div>
                                </f:if>

                                <div class="form__field event-registration-row {e:validation.errorClass(fieldname: 'notes')}">
                                    <label class="label" for="notes">
                                        <f:translate key="tx_sfeventmgt_domain_model_registration.notes" />
                                        <e:registration.isRequiredField settings="{settings}" fieldname="notes">
                                            <span class="event-required">*</span>
                                        </e:registration.isRequiredField>
                                    </label>
                                    <f:form.textarea id="notes" class="textarea" property="notes" />
                                    <f:render partial="FormErrors" arguments="{field: 'registration.notes'}" />
                                </div>

                                <f:if condition="{event.registrationFields}">
                                    <f:for each="{event.registrationFields}" as="field">
                                        <f:render partial="Registration/Fields/{field.partialName}" arguments="{field: field}" />
                                    </f:for>
                                </f:if>

                                <div class="form__field event-registration-row event-registration-row--choice {e:validation.errorClass(fieldname: 'accepttc')}">
                                    <div class="checkbox-group">
                                        <label class="checkbox" for="accepttc">
                                            <span class="checkbox__input">
                                                <f:form.checkbox id="accepttc" class="input input-radio" property="accepttc" value="1" />
                                                <label for="accepttc"></label>
                                            </span>
                                            <span class="checkbox__label">
                                                <f:translate key="tx_sfeventmgt_domain_model_registration.accepttc" />
                                                <f:if condition="{settings.registration.linkTermsAndConditions}">
                                                    <f:then>
                                                        (<f:link.typolink parameter="{settings.registration.linkTermsAndConditions}" target="_blank"><f:translate key="registration.privacy.linkLabel" extensionName="HgonTemplate" /></f:link.typolink>)
                                                    </f:then>
                                                </f:if>
                                                <e:registration.isRequiredField settings="{settings}" fieldname="accepttc">
                                                    <span class="event-required">*</span>
                                                </e:registration.isRequiredField>
                                            </span>
                                        </label>
                                    </div>
                                    <f:form.validationResults for="registration.accepttc">
                                        <f:if condition="{validationResults.flattenedErrors}">
                                            <div class="clearfix mt-1">
                                                <span class="form__error form__error--show float-left">
                                                    <f:translate key="registration.form.accepttc.validationError" extensionName="HgonTemplate" />
                                                </span>
                                            </div>
                                        </f:if>
                                    </f:form.validationResults>
                                </div>

                                <f:if condition="{settings.registration.captcha.enabled}">
                                    <f:render partial="Registration/Captcha/{settings.registration.captcha.type -> f:format.case(mode: 'capital')}" arguments="{_all}" />
                                </f:if>

                                <f:flashMessages />
                        </fieldset>

                        <div class="event-registration-actions">
                            <f:form.submit value="{f:translate(key: 'event.submit-registration')}" class="btn btn--primary btn--rounded" id="registration-submit" />
                        </div>
                    </f:form>

                </div>
            </section>

            <script>
                document.addEventListener('DOMContentLoaded', function () {
                    var amountField = document.getElementById('amountOfRegistrations');
                    var counterInputs = document.querySelectorAll('[data-counter-input]');
                    var syncMaxQuantity = function () {
                        var maxQuantity = amountField ? parseInt(amountField.value || '1', 10) : 1;
                        counterInputs.forEach(function (input) {
                            input.max = String(maxQuantity);
                            if (parseInt(input.value || '0', 10) > maxQuantity) {
                                input.value = String(maxQuantity);
                            }
                        });
                    };
                    document.querySelectorAll('[data-counter-increment]').forEach(function (button) {
                        button.addEventListener('click', function () {
                            var input = button.parentElement.querySelector('[data-counter-input]');
                            var max = parseInt(input.max || '1', 10);
                            var nextValue = Math.min(max, parseInt(input.value || '0', 10) + 1);
                            input.value = String(nextValue);
                        });
                    });
                    document.querySelectorAll('[data-counter-decrement]').forEach(function (button) {
                        button.addEventListener('click', function () {
                            var input = button.parentElement.querySelector('[data-counter-input]');
                            var nextValue = Math.max(0, parseInt(input.value || '0', 10) - 1);
                            input.value = String(nextValue);
                        });
                    });
                    if (amountField) {
                        amountField.addEventListener('change', syncMaxQuantity);
                    }
                    syncMaxQuantity();
                });
            </script>
        </f:then>
        <f:else>
            <f:translate key="event.message.registrationnotpossible" />
        </f:else>
    </f:if>

</f:section>
</html>
