
<f:if condition="{isJournalPage}">
    <section id="news-filter" class="article article--fullwidth / form">
        <form action="{f:uri.page(pageUid: settings.journal.pageUid, section: 'news-filter')}" method="get" class="form js-news-filter-form">
            <div class="flex-container space-between center-cross gutter">
                <div class="flex-item c-3">
                    <p class="form__field">
                        <label for="news-search-term">Suchbegriff</label>
                        <input
                            class="input"
                            id="news-search-term"
                            type="text"
                            name="suche"
                            value="{selectedSearchTerm}"
                            placeholder="Titel oder Teaser durchsuchen"
                            data-empty-value=""
                        />
                    </p>
                </div>
                <div class="flex-item c-3">
                    <p class="form__field">
                        <label for="news-date-range">Zeitraum</label>
                        <span class="select-box">
                            <select id="news-date-range" name="zeitraum" data-empty-value="all">
                                <option value="all" {f:if(condition: '{selectedDateRange} == \'all\'', then: 'selected="selected"')}>Alle</option>
                                <option value="letzte-12-monate" {f:if(condition: '{selectedDateRange} == \'last12\'', then: 'selected="selected"')}>Letzte 12 Monate</option>
                                <option value="letzte-3-jahre" {f:if(condition: '{selectedDateRange} == \'last36\'', then: 'selected="selected"')}>Letzte 3 Jahre</option>
                                <option value="aelter-als-3-jahre" {f:if(condition: '{selectedDateRange} == \'older36\'', then: 'selected="selected"')}>Älter als 3 Jahre</option>
                            </select>
                        </span>
                    </p>
                </div>
                <div class="flex-item c-3">
                    <p class="form__field">
                        <label for="news-primary-category">Bereich</label>
                        <span class="select-box">
                            <select id="news-primary-category" name="bereich" data-empty-value="0">
                                <option value="0">Alle Bereiche</option>
                                <f:for each="{primaryCategoryOptions}" as="category">
                                    <f:if condition="{selectedPrimaryCategory} == {category.uid}">
                                        <f:then>
                                            <option value="{category.uid}" selected="selected">{category.title}</option>
                                        </f:then>
                                        <f:else>
                                            <option value="{category.uid}">{category.title}</option>
                                        </f:else>
                                    </f:if>
                                </f:for>
                            </select>
                        </span>
                    </p>
                </div>
                <div class="flex-item c-3">
                    <p class="form__field">
                        <label for="news-secondary-category">Schlagwort</label>
                        <span class="select-box">
                            <select id="news-secondary-category" name="schlagwort" data-empty-value="0">
                                <option value="0">Alle Schlagworte</option>
                                <f:if condition="{selectedPrimaryCategory}">
                                    <f:then>
                                        <f:for each="{secondaryCategoryOptions}" as="category">
                                            <f:if condition="{selectedSecondaryCategory} == {category.uid}">
                                                <f:then>
                                                    <option value="{category.uid}" selected="selected">{category.title}</option>
                                                </f:then>
                                                <f:else>
                                                    <option value="{category.uid}">{category.title}</option>
                                                </f:else>
                                            </f:if>
                                        </f:for>
                                    </f:then>
                                    <f:else>
                                        <f:for each="{primaryCategoryOptions}" as="parentCategory">
                                            <f:if condition="{secondaryCategoryGroups.{parentCategory.uid}}">
                                                <optgroup label="{parentCategory.title}">
                                                    <f:for each="{secondaryCategoryGroups.{parentCategory.uid}}" as="category">
                                                        <f:if condition="{selectedSecondaryCategory} == {category.uid}">
                                                            <f:then>
                                                                <option value="{category.uid}" selected="selected">{category.title}</option>
                                                            </f:then>
                                                            <f:else>
                                                                <option value="{category.uid}">{category.title}</option>
                                                            </f:else>
                                                        </f:if>
                                                    </f:for>
                                                </optgroup>
                                            </f:if>
                                        </f:for>
                                    </f:else>
                                </f:if>
                            </select>
                        </span>
                    </p>
                </div>
                <div class="flex-item c-12 event-filter__actions">
                    <f:link.page pageUid="{settings.journal.pageUid}" section="news-filter" class="btn btn--rounded btn--tertiary">Zurücksetzen</f:link.page>
                    <button class="btn btn--primary btn--rounded" type="submit">Filter anwenden</button>
                </div>
            </div>
        </form>
    </section>
</f:if>

<f:comment><!-- Listing --></f:comment>
<div class="main__content">
    <section class="section">
        <div class="section__content">
            <div class="flex-container space-between gutter valign-stretch" id="journal-flex-container">
                <f:render partial="Journal/List" arguments="{_all}" />
            </div>
        </div>
        <footer class="section__footer">
            <div class="wrap wrap--text / align-center" id="journal-more-link-container">
                <f:if condition="{showMoreLink}">
                    <f:render partial="Journal/MoreLink" arguments="{_all}" />
                </f:if>
            </div>
        </footer>
    </section>
</div>
