renderingOptions:
  submitButtonLabel: Submit
identifier: birdnet
label: Birdnet
type: Form
prototypeName: standard
finishers:
  -
    options:
      subject: 'Your message: {subject}'
      senderAddress: '{email}'
      senderName: '{name}'
      attachUploads: true
      translation:
        language: ''
      partialRootPaths:
        150: 'EXT:hgon_template/Resources/Private/Extension/HgonTemplate/Partials/'
      layoutRootPaths:
        150: 'EXT:hgon_template/Resources/Private/Extension/HgonTemplate/Layouts/'
      recipients:
        your.company@example.com: 'Your Company name'
      addHtmlPart: true
    identifier: EmailToReceiver
  -
    options:
      subject: 'Birdnet-Formular: Eine neue Nachricht'
      senderAddress: info@hgon.de
      senderName: ''
      attachUploads: true
      partialRootPaths:
        150: 'EXT:hgon_template/Resources/Private/Extension/HgonTemplate/Partials/'
      layoutRootPaths:
        150: 'EXT:hgon_template/Resources/Private/Extension/HgonTemplate/Layouts/'
      recipients:
        info@hgon.de: ''
      addHtmlPart: true
    identifier: EmailToSender
renderables:
  -
    renderingOptions:
      previousButtonLabel: 'Previous step'
      nextButtonLabel: 'Neue Seite'
    identifier: page-1
    label: 'Contact Form'
    type: Page
    renderables:
      -
        defaultValue: ''
        identifier: name
        label: Name
        type: Text
        properties:
          fluidAdditionalAttributes:
            placeholder: Name
        validators:
          -
            identifier: NotEmpty
      -
        defaultValue: ''
        identifier: email
        label: Email
        type: Text
        properties:
          fluidAdditionalAttributes:
            placeholder: 'Email address'
        validators:
          -
            identifier: NotEmpty
          -
            identifier: EmailAddress
      -
        defaultValue: ''
        identifier: subject
        label: Subject
        type: Text
        properties:
          fluidAdditionalAttributes:
            placeholder: Subject
            required: required
        validators:
          -
            identifier: NotEmpty
      -
        defaultValue: ''
        identifier: message
        label: Message
        type: Textarea
        properties:
          fluidAdditionalAttributes:
            placeholder: ''
        validators:
          -
            identifier: NotEmpty
      -
        properties:
          saveToFileMount: '1:/user_upload/'
          allowedMimeTypes:
            - image/jpeg
        type: ImageUpload
        identifier: imageupload-1
        label: Bildupload
  -
    renderingOptions:
      previousButtonLabel: 'Previous step'
      nextButtonLabel: 'Neue Seite'
    identifier: summarypage
    label: 'Summary page'
    type: SummaryPage
