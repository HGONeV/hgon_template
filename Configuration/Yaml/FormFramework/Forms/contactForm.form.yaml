renderingOptions:
  submitButtonLabel: Absenden
identifier: contactForm
label: Kontaktformular
type: Form
prototypeName: standard
finishers:
  -
    options:
      subject: 'Kontaktformular:  {subject}'
      senderAddress: '{email}'
      senderName: '{name}'
      attachUploads: true
      translation:
        language: ''
      partialRootPaths:
        150: 'EXT:hgon_template/Resources/Private/Extension/HgonTemplate/Partials/'
      layoutRootPaths:
        150: 'EXT:hgon_template/Resources/Private/Extension/HgonTemplate/Layouts/'
      recipients:
        info@hgon.de: 'HGON Geschäftsstelle'
      addHtmlPart: true
    identifier: EmailToReceiver
  -
    options:
      subject: 'HGON Kontaktformular:  {subject}'
      senderAddress: info@hgon.de
      senderName: 'HGON Geschäftstelle'
      attachUploads: true
      partialRootPaths:
        150: 'EXT:hgon_template/Resources/Private/Extension/HgonTemplate/Partials/'
      layoutRootPaths:
        150: 'EXT:hgon_template/Resources/Private/Extension/HgonTemplate/Layouts/'
      recipients:
        '{email}': '{name}'
      replyToRecipients:
        info@hgon.de: ''
      addHtmlPart: true
    identifier: EmailToSender
  -
    options:
      message: 'Danke für die Nachricht. Wir melden uns schnellstmöglich zurück.'
    identifier: Confirmation
renderables:
  -
    renderingOptions:
      previousButtonLabel: ''
      nextButtonLabel: 'Nachricht senden'
    identifier: page-1
    label: ''
    type: Page
    renderables:
      -
        defaultValue: ''
        identifier: name
        label: Name
        type: Text
        properties:
          fluidAdditionalAttributes:
            placeholder: Name
            required: required
            minlength: '3'
            maxlength: '999'
        validators:
          -
            identifier: NotEmpty
          -
            options:
              minimum: '3'
              maximum: '999'
            identifier: StringLength
      -
        defaultValue: ''
        identifier: email
        label: Email
        type: Text
        properties:
          fluidAdditionalAttributes:
            placeholder: 'Email address'
            required: required
        validators:
          -
            identifier: NotEmpty
          -
            identifier: EmailAddress
      -
        defaultValue: ''
        identifier: subject
        label: Betreff
        type: Text
        properties:
          fluidAdditionalAttributes:
            placeholder: Betreff
            required: required
        validators:
          -
            identifier: NotEmpty
      -
        defaultValue: ''
        identifier: message
        label: Nachricht
        type: Textarea
        properties:
          fluidAdditionalAttributes:
            placeholder: ''
            required: required
            minlength: '10'
            maxlength: '9999'
        validators:
          -
            identifier: NotEmpty
          -
            options:
              minimum: '10'
              maximum: '9999'
            identifier: StringLength
      -
        type: Fieldset
        identifier: fieldset-1
        label: 'Ich möchte...'
        renderables:
          -
            type: Checkbox
            identifier: checkbox-1
            label: '...Mitglied werden. Bitte senden Sie mir Informationsmaterial und das Beitrittsformular zu.'
          -
            type: Checkbox
            identifier: checkbox-2
            label: '...als Sponsor die Naturschutzarbeit der HGON unterstützen.'
